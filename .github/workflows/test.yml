name: Tests

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v1
      - uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"
      - name: Setup Node
        run: npm install
      - name: Run Server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PORT: 8080
        run: npm run start:dev
      - name: Run Tests
        run: npm run test
